# FilmVault Auto-Update Pipeline
# Runs every 6 hours on GitHub Actions
# Pipeline: scrape → gap find → integrate sources → match netflix → subtitle hunt → poster enrich → split → commit

name: Update FilmVault

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pipeline
        run: |
          set -e
          echo "=== FilmVault Pipeline $(date -u) ==="
          echo ""

          echo "--- Step 1: Incremental scrape ---"
          python pipeline/scraper.py

          echo "--- Step 2: Gap finder ---"
          python pipeline/gap_finder.py

          echo "--- Step 3: Integrate giftmond ---"
          python pipeline/integrate_giftmond.py || true

          echo "--- Step 4: Integrate berlin ---"
          python pipeline/integrate_berlin.py || true

          echo "--- Step 5: Match Netflix catalog ---"
          python pipeline/match_netflix.py || true

          echo "--- Step 6: Subtitle hunter ---"
          python pipeline/subtitle_hunter.py || true

          echo "--- Step 7: Poster/rating enricher ---"
          python pipeline/poster_enhancer.py || true

          echo "--- Step 8: Split catalog ---"
          python split_catalog.py

          echo ""
          echo "=== Pipeline complete ==="
          FILMS=$(python -c 'import json; print(len(json.load(open("catalog.json"))))')
          echo "Catalog: $FILMS films"

      - name: Commit and push
        run: |
          git config user.name "FilmVault Bot"
          git config user.email "bot@filmvault"
          git add catalog.json catalog_*.json catalog_index.json pipeline_state.json pipeline.log
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            FILMS=$(python -c 'import json; print(len(json.load(open("catalog.json"))))')
            git commit -m "Auto-update: $FILMS films [$(date -u +%Y-%m-%dT%H:%M)]"
            git push
          fi
