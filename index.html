<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0B0E">
  <meta name="description" content="FilmVault — Your personal film archive">
  <title>FilmVault</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading -->
  <div id="loader" class="loader">
    <p class="loader-text">Loading library</p>
  </div>

  <!-- App shell (hidden until data loads) -->
  <div id="app" class="app is-hidden">

    <!-- Header -->
    <header class="topbar">
      <div class="topbar-inner">
        <a href="/" class="logo" aria-label="FilmVault home">
          Film<span class="logo-accent">Vault</span>
        </a>

        <div class="search-wrap" role="search">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="search" id="search" class="search-input" placeholder="Search films" autocomplete="off" aria-label="Search films">
          <kbd class="search-kbd" aria-hidden="true">/</kbd>
        </div>
      </div>
    </header>

    <!-- Filters -->
    <nav class="filters" aria-label="Filters">
      <div class="filter-chips">
        <button class="chip is-active" data-filter="all">All</button>
        <button class="chip" data-filter="available">Available</button>
        <button class="chip" data-filter="missing">Missing</button>
        <button class="chip" data-filter="favorites">Favorites</button>
      </div>
      <div class="filter-selects">
        <select id="genre-filter" class="select" aria-label="Filter by genre">
          <option value="">All genres</option>
        </select>
        <select id="year-filter" class="select" aria-label="Filter by year">
          <option value="">All years</option>
          <option value="2020s">2020s</option>
          <option value="2010s">2010s</option>
          <option value="2000s">2000s</option>
          <option value="1990s">1990s</option>
          <option value="older">Before 1990</option>
        </select>
        <select id="sort-filter" class="select" aria-label="Sort by">
          <option value="title">Title A–Z</option>
          <option value="title_desc">Title Z–A</option>
          <option value="year_desc">Newest first</option>
          <option value="year">Oldest first</option>
          <option value="rating">Top rated</option>
        </select>
      </div>
      <p class="filter-count">
        Showing <strong id="count-num">0</strong> of <strong id="total-num">0</strong>
      </p>
    </nav>

    <!-- Grid -->
    <main class="grid-area">
      <div id="grid" class="grid" role="list"></div>
      <div id="sentinel" class="sentinel" aria-hidden="true"></div>
      <div id="empty" class="empty is-hidden">
        <p class="empty-title">No films found</p>
        <p class="empty-sub">Try adjusting your filters or search</p>
      </div>
    </main>

    <!-- Detail panel -->
    <div id="overlay" class="overlay" aria-hidden="true"></div>
    <aside id="panel" class="panel" role="dialog" aria-label="Film detail" aria-hidden="true">
      <div id="panel-content" class="panel-content"></div>
    </aside>

    <!-- Video Player Modal -->
    <div id="player-modal" class="player-modal" aria-hidden="true">
      <div class="player-topbar">
        <button id="player-back" class="player-back" aria-label="Close player">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h3 id="player-title" class="player-film-title"></h3>
        <select id="player-quality" class="player-quality" aria-label="Quality"></select>

      </div>
      <div class="player-stage">
        <video id="player-video" class="player-video" playsinline preload="metadata"></video>
        <div id="player-loading" class="player-loading" aria-hidden="true">
          <div class="player-spinner"></div>
        </div>
      </div>
      <div class="player-controls">
        <button id="player-play" class="player-ctrl" aria-label="Play">
          <svg id="icon-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" class="hidden"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
        </button>
        <span id="player-time" class="player-time">0:00 / 0:00</span>
        <input id="player-seek" class="player-seek" type="range" min="0" max="1000" value="0" aria-label="Seek">
        <div class="player-right-controls">
          <div class="player-vol-wrap">
            <svg class="player-vol-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="currentColor"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <input id="player-vol" class="player-vol" type="range" min="0" max="100" value="100" aria-label="Volume">
          </div>
          <button id="player-fullscreen" class="player-ctrl" aria-label="Fullscreen">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
